<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Register</h1>
    <input 
    type="text"  
    placeholder="Enter name" name="name="/> <br>
    <input
     type="email"
     placeholder="Enter email" name="email"/> <br>
     <input 
     type="password"
     placeholder="Enter password" name="password"/> <br>
     <div><input type="radio" id="gmale" value="male" name="gender"/>
        <label for="gmale">Male</label>
        <input type="radio" id="gfemale" value="female" name="gender"/>
        <label for="gfemale">Female</label>
    </div>
    <div>
        <input type="checkbox" value="10th"/>10th
        <input type="checkbox" value="Inter"/>Inter
        <input type="checkbox" value="Diploma"/>Diploma
        <input type="checkbox" value="Btech"/>Btech
    </div>
    <div>
        <select>
            <option value="">Select your city</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Vizag">Vizag</option>
            <option value="Nellore">Nellore</option>
        </select>
        <div>
            <textarea placeholder="Enter address"></textarea>
        </div>
        <div>
            <label for="">Date of Birth</label>
            <input type="date"/>
        </div>
        <div><label for="">Profile pic</label>
            <input type="file">
        </div>
    </div>
    <button>Submit</button>
</body>
</html>
